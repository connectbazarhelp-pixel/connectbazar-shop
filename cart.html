<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ConnectBazar Checkout</title><style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#f5f7fb;color:#111827}a{text-decoration:none;color:inherit}.top{background:#fff;border-bottom:1px solid #e5e7eb}.nav{max-width:1180px;margin:auto;display:flex;align-items:center;gap:18px;padding:14px}.logo{font-size:24px;font-weight:900}.logo span{color:#ff5b2e}.links{margin-left:auto;display:flex;gap:14px;font-weight:800}.wrap{max-width:1100px;margin:26px auto;display:grid;grid-template-columns:1fr .8fr;gap:18px}.box{background:#fff;border-radius:22px;padding:22px;box-shadow:0 12px 28px #0f172a12}.row{display:grid;grid-template-columns:1fr 110px 80px 90px;gap:10px;align-items:center;border-bottom:1px solid #e5e7eb;padding:14px 0}.seller{font-size:13px;color:#64748b;margin-top:4px}.btn{border:0;background:#2563eb;color:#fff;padding:12px 16px;border-radius:10px;font-weight:800;cursor:pointer}.remove{background:#fee2e2;color:#b91c1c}.total{text-align:right;font-size:22px;font-weight:900;margin-top:18px}.form{display:grid;gap:12px}.form input,.form textarea,.form select{width:100%;border:1px solid #dbe3ef;border-radius:12px;padding:13px;font-size:15px;outline:none}.pay{display:grid;grid-template-columns:1fr 1fr;gap:10px}.pay label{border:1px solid #dbe3ef;border-radius:14px;padding:12px;font-weight:800;background:#f8fafc}.note{background:#ecfdf5;color:#166534;border-radius:14px;padding:12px;font-weight:700;font-size:14px}.bottom{display:none}@media(max-width:760px){.wrap{grid-template-columns:1fr;margin:12px}.row{grid-template-columns:1fr}.links{font-size:13px}.pay{grid-template-columns:1fr}.bottom{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;justify-content:space-around;padding:9px 4px;z-index:20}.bottom a{font-size:12px;text-align:center;font-weight:800}body{padding-bottom:60px}}
</style></head><body><div class="top"><div class="nav"><a class="logo" href="index.html">Connect<span>Bazar</span></a><div class="links"><a href="products.html">Deals</a><a href="index.html">Home</a></div></div></div><main class="wrap"><section class="box"><h1>🛒 My Cart</h1><div id="cartBox"></div><div class="total" id="total"></div></section><section class="box"><h2>🧾 Buy / Order Form</h2><p class="note">Customer buy korle ekhane details fill kore order WhatsApp-e jabe.</p><div class="form"><input id="custName" placeholder="Customer Name *"><input id="mobile" placeholder="Mobile Number *" maxlength="10"><input id="pincode" placeholder="PIN Code *" maxlength="6"><textarea id="address" rows="3" placeholder="Full Address / Village / Road *"></textarea><input id="landmark" placeholder="Landmark / Nearby place"><select id="payment"><option value="Cash on Delivery">Cash on Delivery</option><option value="UPI Payment">UPI Payment</option><option value="Pay Later / Confirm by Call">Pay Later / Confirm by Call</option></select><textarea id="notes" rows="2" placeholder="Extra details / color / size / message"></textarea><button class="btn" onclick="placeOrder()">Place Order on WhatsApp</button><button class="btn remove" onclick="clearCart()">Clear Cart</button></div></section></main><div class="bottom"><a href="index.html">🏠<br>Home</a><a href="products.html">🛍️<br>Deals</a><a href="offers.html">🏪<br>Offers</a><a href="coupons.html">🎟️<br>Coupons</a><a href="cart.html">🛒<br>Cart</a></div><script>
function getCart(){return JSON.parse(localStorage.getItem('cb_cart')||'[]')}function saveCart(c){localStorage.setItem('cb_cart',JSON.stringify(c));render()}function render(){let c=getCart(),box=document.getElementById('cartBox'),total=0;if(!c.length){box.innerHTML='<p>Your cart is empty.</p>';document.getElementById('total').textContent='';return}box.innerHTML=c.map((x,i)=>{total+=x.price*x.qty;return `<div class="row"><div><b>${x.name}</b><div class="seller">Buy From: ${x.seller||'ConnectBazar'}</div></div><span>₹${x.price}</span><span>Qty: ${x.qty}</span><button class="btn remove" onclick="removeItem(${i})">Remove</button></div>`}).join('');document.getElementById('total').textContent='Total: ₹'+total}function removeItem(i){let c=getCart();c.splice(i,1);saveCart(c)}function clearCart(){localStorage.removeItem('cb_cart');render()}function placeOrder(){let c=getCart();if(!c.length)return alert('Cart empty');let name=document.getElementById('custName').value.trim(),mobile=document.getElementById('mobile').value.trim(),pin=document.getElementById('pincode').value.trim(),addr=document.getElementById('address').value.trim(),land=document.getElementById('landmark').value.trim(),pay=document.getElementById('payment').value,notes=document.getElementById('notes').value.trim();if(!name||!mobile||!pin||!addr)return alert('Name, Mobile, PIN Code and Address required');let total=c.reduce((a,b)=>a+b.price*b.qty,0);let items=c.map(x=>`${x.name} | Buy From: ${x.seller||'ConnectBazar'} | Qty ${x.qty} | ₹${x.price*x.qty}`).join('%0A');let text=`ConnectBazar New Order%0A%0AItems:%0A${items}%0A%0ATotal: ₹${total}%0A%0ACustomer Name: ${encodeURIComponent(name)}%0AMobile: ${encodeURIComponent(mobile)}%0APIN Code: ${encodeURIComponent(pin)}%0AAddress: ${encodeURIComponent(addr)}%0ALandmark: ${encodeURIComponent(land)}%0APayment: ${encodeURIComponent(pay)}%0ANotes: ${encodeURIComponent(notes)}`;location.href='https://wa.me/916294160758?text='+text}render()
</script></body></html>
