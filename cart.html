<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cart Checkout</title><link rel="stylesheet" href="style.css"></head><body><div class="top"><div class="nav"><a class="logo" href="index.html">Connect<span>Bazar</span></a><div class="search"><input placeholder="Search products, sellers, coupons..."><button>Search</button></div><div class="links"><a href="products.html">Products</a><a href="offers.html">Local Offers</a><a href="coupons.html">Coupons</a><a href="cart.html">🛒 Cart <span class="cartCount">0</span></a></div></div></div>
<main class="section"><h1>Cart & Checkout</h1><div class="hero"><div class="panel"><h2>Cart Items</h2><div id="cartItems"></div></div><div class="panel"><h2>Buy Form</h2><div class="form"><input id="name" placeholder="Customer full name"><input id="mobile" placeholder="Mobile number"><input id="pincode" placeholder="PIN code"><textarea id="address" placeholder="Full address"></textarea><label><input type="radio" name="payment" value="COD" checked> Cash on Delivery</label><label><input type="radio" name="payment" value="UPI"> UPI Payment</label><button class="btn green" onclick="createOrder()">Place Order</button></div></div></div><div class="panel"><h2>Customer Order Status</h2><div id="customerOrders"></div></div></main><script>document.addEventListener('DOMContentLoaded',()=>{let c=getCart();cartItems.innerHTML=c.length?c.map(i=>`<div class="seller"><div><b>${i.name}</b><br><span class="small">Buy From: ${i.seller} • Seller ID: ${i.sellerId}</span></div><div><b>₹${i.price}</b> × ${i.qty}</div></div>`).join('')+`<h3>Total ₹${c.reduce((a,b)=>a+b.price*b.qty,0)}</h3>`:'<p>Cart empty.</p>'})</script><div class="bottom"><a href="index.html">🏠<br>Home</a><a href="products.html">🛍️<br>Products</a><a href="offers.html">🏪<br>Offers</a><a href="coupons.html">🎟️<br>Coupons</a><a href="cart.html">🛒<br>Cart</a></div><div class="footer">© ConnectBazar.in — Multi Seller Marketplace</div><script src="firebase-config.js"></script><script src="app.js"></script>
</body></html>
