<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ConnectBazar Cart</title><style>*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#f5f7fb;color:#111827}a{text-decoration:none;color:inherit}.top{background:#fff;border-bottom:1px solid #e5e7eb}.nav{max-width:1180px;margin:auto;display:flex;align-items:center;gap:18px;padding:14px}.logo{font-size:24px;font-weight:900}.logo span{color:#ff5b2e}.links{margin-left:auto;display:flex;gap:14px;font-weight:800}.section{max-width:900px;margin:28px auto;background:#fff;border-radius:22px;padding:22px;box-shadow:0 12px 28px #0f172a12}.row{display:grid;grid-template-columns:1fr 100px 80px 100px;gap:10px;align-items:center;border-bottom:1px solid #e5e7eb;padding:14px 0}.btn{border:0;background:#2563eb;color:#fff;padding:11px 16px;border-radius:10px;font-weight:800}.remove{background:#fee2e2;color:#b91c1c}.total{text-align:right;font-size:22px;font-weight:900;margin-top:18px}@media(max-width:760px){.row{grid-template-columns:1fr;}.links{font-size:13px}.section{margin:12px}}</style></head><body><div class="top"><div class="nav"><a class="logo" href="index.html">Connect<span>Bazar</span></a><div class="links"><a href="products.html">Deals</a><a href="index.html">Home</a></div></div></div><section class="section"><h1>🛒 My Cart</h1><div id="cartBox"></div><div class="total" id="total"></div><br><button class="btn" onclick="checkout()">Checkout / Order on WhatsApp</button></section><script>function getCart(){return JSON.parse(localStorage.getItem('cb_cart')||'[]')}function saveCart(c){localStorage.setItem('cb_cart',JSON.stringify(c));render()}function render(){let c=getCart(),box=document.getElementById('cartBox'),total=0;if(!c.length){box.innerHTML='<p>Your cart is empty.</p>';document.getElementById('total').textContent='';return}box.innerHTML=c.map((x,i)=>{total+=x.price*x.qty;return `<div class="row"><b>${x.name}</b><span>₹${x.price}</span><span>Qty: ${x.qty}</span><button class="btn remove" onclick="removeItem(${i})">Remove</button></div>`}).join('');document.getElementById('total').textContent='Total: ₹'+total}function removeItem(i){let c=getCart();c.splice(i,1);saveCart(c)}function checkout(){let c=getCart();if(!c.length)return alert('Cart empty');let text='ConnectBazar Order:%0A'+c.map(x=>`${x.name} - Qty ${x.qty} - ₹${x.price*x.qty}`).join('%0A');location.href='https://wa.me/916294160758?text='+text}render()</script></body></html>
