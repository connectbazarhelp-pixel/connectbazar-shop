<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Product Details</title><link rel="stylesheet" href="style.css"></head><body><div class="top"><div class="nav"><a class="logo" href="index.html">Connect<span>Bazar</span></a><div class="search"><input placeholder="Search products, sellers, coupons..."><button>Search</button></div><div class="links"><a href="products.html">Products</a><a href="offers.html">Local Offers</a><a href="coupons.html">Coupons</a><a href="cart.html">🛒 Cart <span class="cartCount">0</span></a></div></div></div>
<main class="section"><div id="details"></div></main><script>document.addEventListener('DOMContentLoaded',()=>{let id=new URLSearchParams(location.search).get('id')||'samsung-a16';let p=getAllProducts().find(x=>x.id===id)||getAllProducts()[0];details.innerHTML=`<div class="card"><div class="pic">${String(p.img).startsWith('data:')?'<img src="'+p.img+'" style="max-width:100%;max-height:140px;border-radius:14px">':p.img}</div><h1>${p.name}</h1><p>MRP: <span class="old">₹${p.mrp}</span> Best Price: <span class="price">₹${Math.min(...p.offers.map(o=>Number(o.price)))}</span></p><h2>Compare Sellers</h2>${p.offers.sort((a,b)=>a.price-b.price).map(o=>`<div class="seller"><div><b>${o.seller}</b><br><span class="small">Seller ID: ${o.sellerId} • ${o.location} • ${o.rating||4.5} ★ • Stock ${o.stock}</span><br>${o.size?'<span class="small">Size/Variant: '+o.size+'</span><br>':''}${o.coupon?'<span class="badge">Coupon: '+o.coupon+'</span>':''} <span class="badge">Approved Seller</span></div><div><div class="price">₹${o.price}</div><div class="actions"><button class="btn green" onclick="buyNow('${p.id}','${o.sellerId}')">Buy Now</button><button class="btn dark" onclick="addToCart('${p.id}','${o.sellerId}')">Add to Cart</button></div></div></div>`).join('')}</div>`})</script><div class="bottom"><a href="index.html">🏠<br>Home</a><a href="products.html">🛍️<br>Products</a><a href="offers.html">🏪<br>Offers</a><a href="coupons.html">🎟️<br>Coupons</a><a href="cart.html">🛒<br>Cart</a></div><div class="footer">© ConnectBazar.in — Multi Seller Marketplace</div><script src="firebase-config.js"></script><script src="app.js"></script>
</body></html>
