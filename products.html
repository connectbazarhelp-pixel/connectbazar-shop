<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Products</title><link rel="stylesheet" href="style.css"></head><body><div class="top"><div class="nav"><a class="logo" href="index.html">Connect<span>Bazar</span></a><div class="search"><input placeholder="Search products, sellers, coupons..."><button>Search</button></div><div class="links"><a href="products.html">Products</a><a href="offers.html">Local Offers</a><a href="coupons.html">Coupons</a><a href="cart.html">🛒 Cart <span class="cartCount">0</span></a></div></div></div>
<main class="section"><h1>Products</h1><p class="small">Same product er niche multiple seller price show hobe. Approved seller product automatic show hobe.</p><div id="products" class="grid"></div></main><script>document.addEventListener('DOMContentLoaded',()=>{let ps=getAllProducts();products.innerHTML=ps.map(p=>`<div class="card"><div class="pic">${String(p.img).startsWith('data:')?'<img src="'+p.img+'" style="max-width:100%;max-height:130px;border-radius:14px">':p.img}</div><h3>${p.name}</h3><p>Category: ${p.cat}</p><p><span class="price">From ₹${Math.min(...p.offers.map(o=>Number(o.price)))}</span> <span class="old">₹${p.mrp}</span></p><p class="small">${p.offers.length} sellers available</p><a class="btn" href="product-details.html?id=${p.id}">View Sellers</a></div>`).join('')})</script><div class="bottom"><a href="index.html">🏠<br>Home</a><a href="products.html">🛍️<br>Products</a><a href="offers.html">🏪<br>Offers</a><a href="coupons.html">🎟️<br>Coupons</a><a href="cart.html">🛒<br>Cart</a></div><div class="footer">© ConnectBazar.in — Multi Seller Marketplace</div><script src="firebase-config.js"></script><script src="app.js"></script>
</body></html>
