<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>CB Admin Control</title><style>body{font-family:Arial;background:#111827;color:white;margin:0}.wrap{max-width:1000px;margin:auto;padding:20px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card{background:#1f2937;border-radius:18px;padding:20px}.btn{background:#22c55e;color:#fff;padding:12px 16px;border-radius:10px;display:inline-block}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><h1>Hidden Admin Panel</h1><p>PIN: 1234</p><div class="grid"><div class="card"><h3>Sellers</h3><p>Manage Seller IDs</p></div><div class="card"><h3>Products</h3><p>Approve deals</p></div><div class="card"><h3>Coupons</h3><p>Manage coupons</p></div><div class="card"><h3>Offers</h3><p>Local offers</p></div></div></div><div id="toast" class="toast">Added to cart</div><script>
function getCart(){return JSON.parse(localStorage.getItem('cb_cart')||'[]')}
function saveCart(c){localStorage.setItem('cb_cart',JSON.stringify(c));updateCartCount()}
function addToCart(name,price){let c=getCart();let item=c.find(x=>x.name===name); if(item){item.qty++}else{c.push({name,price,qty:1})} saveCart(c); let t=document.getElementById('toast'); if(t){t.style.display='block'; setTimeout(()=>t.style.display='none',1400)}}
function updateCartCount(){let n=getCart().reduce((a,b)=>a+b.qty,0); document.querySelectorAll('#cartCount').forEach(e=>e.textContent=n)}
document.addEventListener('DOMContentLoaded',updateCartCount);
</script></body></html>
