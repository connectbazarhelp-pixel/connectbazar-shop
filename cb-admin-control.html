<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>ConnectBazar Admin</title><style>body{margin:0;font-family:Arial;background:#f4f6fb}.login{max-width:380px;margin:70px auto;background:white;padding:25px;border-radius:22px;box-shadow:0 6px 20px #0001}input{width:100%;padding:14px;margin:8px 0 14px;border:1px solid #ddd;border-radius:12px}.btn{border:0;background:#111827;color:white;padding:14px 20px;border-radius:12px;font-weight:900}.admin{display:none}.side{background:#111827;color:white;padding:20px}.main{padding:20px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}.card{background:white;padding:20px;border-radius:18px;box-shadow:0 5px 15px #0001}@media(min-width:801px){.admin{grid-template-columns:240px 1fr}.admin.show{display:grid}}@media(max-width:800px){.admin.show{display:block}.grid{grid-template-columns:repeat(2,1fr)}}</style></head><body><div class="login" id="login"><h2>Hidden Admin Panel</h2><p>PIN: 1234</p><input id="pin" type="password" placeholder="Enter PIN"><button class="btn" onclick="go()">Login</button></div><div class="admin" id="admin"><div class="side"><h2>ConnectBazar Admin</h2><p>Dashboard</p><p>Shops</p><p>Offers</p><p>Coupons</p><p>Products</p></div><div class="main"><h1>Dashboard</h1><div class="grid"><div class="card"><b>Pending Offers</b><h2>12</h2></div><div class="card"><b>Approved Shops</b><h2>48</h2></div><div class="card"><b>Coupons</b><h2>22</h2></div><div class="card"><b>Affiliate Deals</b><h2>35</h2></div></div></div></div><script>function go(){if(pin.value==='1234'){login.style.display='none';admin.classList.add('show')}else alert('Wrong PIN')}</script></body></html>
