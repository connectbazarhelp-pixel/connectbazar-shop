<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Dashboard</title><style>*{box-sizing:border-box}body{font-family:Arial;background:#f4f6fb;margin:0}.top{background:#111827;color:#fff;padding:16px 5%;font-weight:900}.wrap{max-width:900px;margin:25px auto;padding:0 12px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card,.box{background:#fff;border-radius:18px;padding:18px;box-shadow:0 6px 20px #0001}input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:10px}.btn{background:#05a357;color:#fff;border:0;border-radius:10px;padding:12px 15px;font-weight:900}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><div class="top">ConnectBazar Seller Dashboard</div><div class="wrap"><div class="box"><h2>Welcome, <span id="sellerId"></span></h2><p>Ei dashboard sudhu personal Seller ID diye khulbe. Public website-e Seller/Add Shop option nei.</p></div><div class="grid"><div class="card"><h3>My Offers</h3><b>0</b></div><div class="card"><h3>Pending Approval</h3><b>0</b></div><div class="card"><h3>Leads</h3><b>0</b></div></div><div class="box" style="margin-top:16px"><h3>Add Offer Request</h3><input placeholder="Offer title"><textarea placeholder="Offer details"></textarea><input placeholder="Coupon code"><input placeholder="WhatsApp number"><button class="btn">Send for Admin Approval</button></div></div><script>let id=localStorage.getItem('cbSellerId'); if(!id){location.href='seller-access.html'} sellerId.textContent=id;</script></body></html>
