<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Dashboard</title><style>body{font-family:Arial;background:#f5f7fb;margin:0}.wrap{max-width:1000px;margin:auto;padding:20px}.card{background:#fff;border-radius:18px;padding:20px;margin:14px 0;box-shadow:0 8px 22px #0001}.btn{background:#2563eb;color:#fff;padding:12px 16px;border-radius:10px;display:inline-block}</style></head><body><div class="wrap"><h1>Seller Dashboard</h1><p>Seller ID: CB100001</p><div class="card"><h3>Add Product / Offer</h3><p>Only your own products and offers will show here.</p><a class="btn">Add New</a></div><div class="card"><h3>Status</h3><p>Pending admin approval.</p></div></div><div id="toast" class="toast">Added to cart</div><script>
function getCart(){return JSON.parse(localStorage.getItem('cb_cart')||'[]')}
function saveCart(c){localStorage.setItem('cb_cart',JSON.stringify(c));updateCartCount()}
function addToCart(name,price){let c=getCart();let item=c.find(x=>x.name===name); if(item){item.qty++}else{c.push({name,price,qty:1})} saveCart(c); let t=document.getElementById('toast'); if(t){t.style.display='block'; setTimeout(()=>t.style.display='none',1400)}}
function updateCartCount(){let n=getCart().reduce((a,b)=>a+b.qty,0); document.querySelectorAll('#cartCount').forEach(e=>e.textContent=n)}
document.addEventListener('DOMContentLoaded',updateCartCount);
</script></body></html>
