<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Add Shop Offer — ConnectBazar</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"></head><body>
<div class="top"><div class="nav"><a class="logo" href="index.html">Connect<span>Bazar</span></a><div class="links"><a href="index.html">Home</a></div></div></div>
<main class="seller-login-wrap"><div class="seller-login-card">
<div class="seller-logo"><div class="mark">🏪</div><div>Shop Owner<br><span class="small">Offer submission</span></div></div>
<h1>Add Your Shop Offer</h1>
<p class="small">Tell us about your shop and current offer. Our team reviews every submission before it goes live.</p>
<div class="form">
<label>Shop name</label><input placeholder="Shop name">
<label>Owner name</label><input placeholder="Owner name">
<label>Mobile / WhatsApp</label><input placeholder="Mobile / WhatsApp">
<label>Category</label><select><option>Category</option><option>Mobile</option><option>Grocery</option><option>Fashion</option><option>Electronics</option></select>
<label>Shop address</label><input placeholder="Shop address">
<label>Offer title</label><input placeholder="Offer title">
<label>Offer details</label><textarea placeholder="Offer details"></textarea>
<label>Coupon code</label><input placeholder="Coupon code">
<label>Valid until</label><input type="date">
<button class="btn green" onclick="alert('Demo submit done. Connect Firebase to send this to admin for approval.')">Submit Offer</button>
</div>
<p class="small" style="margin-top:14px"><a href="index.html">← Back Home</a></p>
</div></main>
</body></html>
