<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Access</title><style>body{font-family:Arial;background:#f5f7fb;margin:0;display:grid;place-items:center;min-height:100vh}.box{background:white;padding:28px;border-radius:20px;box-shadow:0 15px 35px #0001;width:min(420px,92%)}input,button{width:100%;padding:13px;margin:8px 0;border-radius:10px;border:1px solid #ddd}button{background:#2563eb;color:white;font-weight:800}</style></head><body><div class="box"><h2>ConnectBazar Seller Access</h2><p>Private seller login. Use your Seller ID and PIN.</p><input placeholder="Seller ID: CB100001"><input placeholder="PIN" type="password"><button onclick="location.href='seller-dashboard.html'">Login</button></div><div id="toast" class="toast">Added to cart</div><script>
function getCart(){return JSON.parse(localStorage.getItem('cb_cart')||'[]')}
function saveCart(c){localStorage.setItem('cb_cart',JSON.stringify(c));updateCartCount()}
function addToCart(name,price){let c=getCart();let item=c.find(x=>x.name===name); if(item){item.qty++}else{c.push({name,price,qty:1})} saveCart(c); let t=document.getElementById('toast'); if(t){t.style.display='block'; setTimeout(()=>t.style.display='none',1400)}}
function updateCartCount(){let n=getCart().reduce((a,b)=>a+b.qty,0); document.querySelectorAll('#cartCount').forEach(e=>e.textContent=n)}
document.addEventListener('DOMContentLoaded',updateCartCount);
</script></body></html>
