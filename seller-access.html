<!DOCTYPE html><html lang="en"><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>Private Seller Access - ConnectBazar</title><style>*{box-sizing:border-box}body{font-family:Arial;background:#f4f6fb;margin:0}.box{max-width:430px;margin:55px auto;background:white;padding:25px;border-radius:24px;box-shadow:0 8px 30px #0002}.logo{font-size:26px;font-weight:900;margin-bottom:10px}.logo span{color:#05a357}input{width:100%;padding:14px;margin:8px 0 14px;border:1px solid #ddd;border-radius:12px;font-size:15px}.btn{width:100%;border:0;background:#05a357;color:white;padding:14px;border-radius:12px;font-weight:900;font-size:16px}.note{background:#fff4bf;border:1px dashed #c79300;padding:10px;border-radius:12px;font-size:14px}.err{color:red;font-weight:700}</style></head><body><div class="box"><div class="logo"><span>Connect</span>Bazar</div><h2>Private Seller Access</h2><p class="note">Ei page public menu-te nei. Seller-ke personal link + Seller ID deya hobe.</p><label>Seller ID</label><input id="sid" placeholder="Example: CB-S001"><label>PIN</label><input id="pin" type="password" placeholder="Seller PIN"><button class="btn" onclick="login()">Open Seller Dashboard</button><p id="msg" class="err"></p></div><script>const params=new URLSearchParams(location.search); if(params.get('id')) sid.value=params.get('id'); const sellers={'CB-S001':'1111','CB-S002':'2222','CB-S003':'3333'};function login(){let id=sid.value.trim().toUpperCase(), p=pin.value.trim(); if(sellers[id]===p){localStorage.setItem('cbSellerId',id); location.href='seller-dashboard.html';}else msg.textContent='Wrong Seller ID or PIN';}</script></body></html>
